<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5f6fa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="מקלט קרוב">
<title>מקלט קרוב — רמת גן</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<style>
:root{--bg:#f5f6fa;--surface:#ffffff;--surface2:#f0f2f8;--border:rgba(0,0,0,0.10);--red:#e63946;--red-glow:rgba(230,57,70,0.35);--green:#2ecc71;--text:#1a2340;--muted:#7a8aaa;--accent:#2563eb;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;}
#alert-bar{position:fixed;top:0;left:0;right:0;z-index:3000;background:var(--red);color:#fff;text-align:center;font-size:14px;font-weight:700;padding:10px 16px;display:none;animation:pulsebar 1.4s ease-in-out infinite;}
@keyframes pulsebar{0%,100%{opacity:1}50%{opacity:0.65}}
#header{position:relative;z-index:200;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;}
.logo-area{display:flex;align-items:center;gap:10px;}
.logo-icon{width:40px;height:40px;background:var(--red);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 22px var(--red-glow);flex-shrink:0;}
.logo-text h1{font-size:17px;font-weight:900;letter-spacing:-0.4px;line-height:1.1;}
.logo-text p{font-size:11px;color:var(--muted);}
.btn-icon{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0;}
.btn-icon:active{transform:scale(0.91);}
.btn-icon.active{background:var(--green);border-color:var(--green);color:#000;}
#map-wrap{flex:1;position:relative;overflow:hidden;min-height:0;}
#map{width:100%;height:100%;}
.leaflet-tile{filter:none;}
#btn-locate{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:500;background:var(--red);color:#fff;border:none;border-radius:50px;padding:15px 30px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 28px var(--red-glow),0 2px 10px rgba(0,0,0,0.5);display:flex;align-items:center;gap:9px;transition:all 0.2s;white-space:nowrap;}
#btn-locate:active{transform:translateX(-50%) scale(0.95);}
#btn-locate.loading{background:#aab0c0;pointer-events:none;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
#btn-locate.loading .spinner{display:block;}
#btn-locate.loading .btn-txt{display:none;}
#acc-toggle{position:absolute;top:12px;left:12px;z-index:500;background:rgba(255,255,255,0.95);border:1px solid var(--border);border-radius:10px;padding:8px 13px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s;backdrop-filter:blur(8px);}
#acc-toggle.active{background:rgba(46,204,113,0.18);color:var(--green);border-color:var(--green);}
#status-card{position:absolute;top:12px;right:12px;z-index:500;background:rgba(255,255,255,0.95);border:1px solid var(--border);border-radius:12px;padding:9px 13px;font-size:12px;color:var(--muted);align-items:center;gap:7px;display:none;backdrop-filter:blur(10px);}
#status-card.show{display:flex;}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.5s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
#bottom-panel{position:relative;z-index:200;background:var(--surface);border-top:1px solid var(--border);max-height:48vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.34,1.4,0.64,1);flex-shrink:0;}
#bottom-panel.open{transform:translateY(0);}
.panel-drag{width:38px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.panel-hdr{padding:10px 18px 8px;display:flex;align-items:center;justify-content:space-between;}
.panel-hdr h2{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;}
.panel-hdr span{font-size:12px;color:var(--muted);}
.shelter-list{padding:0 12px 20px;display:flex;flex-direction:column;gap:8px;}
.shelter-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px 15px;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden;}
.shelter-card::after{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:var(--muted);border-radius:0 14px 14px 0;}
.shelter-card.nearest::after{background:var(--red);}
.shelter-card.is-acc::after{background:var(--green);}
.shelter-card.nearest.is-acc::after{background:linear-gradient(to bottom,var(--red) 50%,var(--green) 50%);}
.shelter-card:active{transform:scale(0.98);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.card-name{font-size:15px;font-weight:800;line-height:1.3;flex:1;}
.badges{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.badge-n{background:rgba(230,57,70,0.15);color:var(--red);border:1px solid rgba(230,57,70,0.4);}
.badge-a{background:rgba(46,204,113,0.12);color:var(--green);border:1px solid rgba(46,204,113,0.35);}
.card-addr{font-size:12px;color:var(--muted);margin-bottom:6px;}
.card-nbr{font-size:11px;color:#4a5870;margin-bottom:8px;}
.card-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.meta{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);}
.meta strong{color:var(--text);font-weight:700;}
.card-note{margin-top:7px;font-size:11px;color:#6b7a99;padding:5px 10px;background:rgba(255,255,255,0.03);border-radius:8px;}
.card-wifi{margin-top:6px;font-size:11px;color:var(--accent);padding:5px 10px;background:rgba(76,201,240,0.06);border-radius:8px;display:flex;align-items:center;gap:5px;}
.card-actions{display:flex;gap:8px;margin-top:11px;}
.btn-nav{flex:1;padding:11px 8px;border-radius:10px;border:none;font-family:'Heebo',sans-serif;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.18s;}
.btn-waze{background:#00c2c2;color:#000;}
.btn-google{background:#4285f4;color:#fff;}
.btn-nav:active{transform:scale(0.95);}
#loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity 0.5s;}
#loading.hidden{opacity:0;pointer-events:none;}
.load-icon{width:76px;height:76px;background:var(--red);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 0 50px var(--red-glow);animation:loadpulse 1.4s ease-in-out infinite;}
@keyframes loadpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.load-title{font-size:24px;font-weight:900;}
.load-sub{font-size:13px;color:var(--muted);}
#toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);z-index:2000;background:#ffffff;border:1px solid var(--border);border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#bottom-panel::-webkit-scrollbar{width:3px;}
#bottom-panel::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>

function dist(a,b,c,d){const R=6371000,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180;const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

const ICON_GREEN=()=>makeIcon('♿','#2ecc71');
const ICON_STAR=()=>makeIcon('⭐','#e63946',46,'rgba(230,57,70,0.9)');
const ICON_USER=()=>L.divIcon({className:'',html:`<div style="width:20px;height:20px;background:#4cc9f0;border-radius:50%;border:3px solid #fff;box-shadow:0 0 14px rgba(76,201,240,0.7);"></div>`,iconSize:[20,20],iconAnchor:[10,10]});

function initApp(){
  map=L.map('map',{center:[32.073,34.820],zoom:13,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  renderMarkers();
  document.getElementById('loading').classList.add('hidden');
}

function renderMarkers(nearestId=null){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  const pool=accessibleOnly?SHELTERS.filter(s=>s.accessible):SHELTERS;
  pool.forEach(s=>{
    const icon=s.id===nearestId?ICON_STAR():(s.accessible?ICON_GREEN():ICON_RED());
    const m=L.marker([s.lat,s.lng],{icon}).addTo(map).on('click',()=>scrollToCard(s.id));
    markers.push(m);
  });
}

function locateMe(){
  const btn=document.getElementById('btn-locate');
  btn.classList.add('loading');setStatus('ממקם...');
  if(!navigator.geolocation){useDemoLoc();return;}
  navigator.geolocation.getCurrentPosition(
    p=>placeUser(p.coords.latitude,p.coords.longitude),
    ()=>{toast('משתמש במיקום דמו');useDemoLoc();},
    {timeout:8000,maximumAge:60000}
  );
}
function useDemoLoc(){placeUser(32.0730,34.8200);}
function placeUser(lat,lng){
  userLat=lat;userLng=lng;
  if(userMarker)map.removeLayer(userMarker);
  if(userCircle)map.removeLayer(userCircle);
  userMarker=L.marker([lat,lng],{icon:ICON_USER()}).addTo(map);
  userCircle=L.circle([lat,lng],{radius:50,color:'#4cc9f0',fillColor:'#4cc9f0',fillOpacity:0.08,weight:1}).addTo(map);
  findNearest();
}

function findNearest(){
  const btn=document.getElementById('btn-locate');
  const pool=accessibleOnly?SHELTERS.filter(s=>s.accessible):SHELTERS;
  const sorted=pool.map(s=>{return{...s,d:dist(userLat,userLng,s.lat,s.lng)}}).sort((a,b)=>a.d-b.d);
  if(!sorted.length){btn.classList.remove('loading');toast('לא נמצאו מקלטים. כבה פילטר נגישות.');return;}
  const nearest=sorted[0];
  renderMarkers(nearest.id);
  map.flyToBounds(L.latLngBounds([[userLat,userLng],[nearest.lat,nearest.lng]]),{padding:[60,60],maxZoom:16});
  setStatus(`${fmt(nearest.d)} ממך`);
  renderPanel(sorted);
  btn.classList.remove('loading');
  setTimeout(openPanel,600);
}

function renderPanel(sorted){
  document.getElementById('panel-count').textContent=`${sorted.length} מקלטים`;
  const list=document.getElementById('shelter-list');
  list.innerHTML='';
  const top5=sorted.slice(0,5);
  top5.forEach((s,i)=>{
    const walk=Math.ceil(s.d/80);
    const card=document.createElement('div');
    card.className='shelter-card'+(i===0?' nearest':'')+(s.accessible?' is-acc':'');
    card.id=`card-${s.id}`;
    const wifiHtml=s.wifi?`<div class="card-wifi">📶 ${s.wifi}</div>`:'';
    const noteHtml=s.note?`<div class="card-note">💡 ${s.note}</div>`:'';
    card.innerHTML=`
      <div class="card-top">
        <div class="card-name">${s.name}</div>
        <div class="badges">
          ${i===0?'<span class="badge badge-n">קרוב ביותר</span>':''}
          ${s.accessible?'<span class="badge badge-a">♿ נגיש</span>':''}
        </div>
      </div>
      <div class="card-addr">📍 ${s.address}</div>
      <div class="card-nbr">🏘️ ${s.neighborhood}</div>
      <div class="card-meta">
        <div class="meta">🚶 <strong>${walk} דק'</strong></div>
        <div class="meta">📏 <strong>${fmt(s.d)}</strong></div>
      </div>
      ${noteHtml}${wifiHtml}
      <div class="card-actions">
        <button class="btn-nav btn-waze" onclick="navWaze(${s.lat},${s.lng},event)">🟦 Waze</button>
        <button class="btn-nav btn-google" onclick="navGoogle(${s.lat},${s.lng},event)">🗺️ Google</button>
      </div>`;
    card.addEventListener('click',e=>{if(e.target.classList.contains('btn-nav'))return;map.flyTo([s.lat,s.lng],17);});
    list.appendChild(card);
  });
  if(sorted.length>5){
    const more=document.createElement('div');
    more.style.cssText='text-align:center;padding:10px;font-size:12px;color:#6b7a99;';
    more.textContent=`+ ${sorted.length-5} מקלטים נוספים בסביבה`;
    list.appendChild(more);
  }
}

function openPanel(){document.getElementById('bottom-panel').classList.add('open');}
function scrollToCard(id){openPanel();setTimeout(()=>{const el=document.getElementById(`card-${id}`);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},400);}
function navWaze(lat,lng,e){e&&e.stopPropagation();window.open(`https://waze.com/ul?ll=${lat},${lng}&navigate=yes`,'_blank');}
function navGoogle(lat,lng,e){e&&e.stopPropagation();window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=walking`,'_blank');}

function toggleAcc(){
  accessibleOnly=!accessibleOnly;
  document.getElementById('acc-toggle').classList.toggle('active',accessibleOnly);
  document.getElementById('btn-acc-hdr').classList.toggle('active',accessibleOnly);
  document.getElementById('acc-label').textContent=accessibleOnly?'נגיש בלבד':'כל המקלטים';
  renderMarkers();
  if(userLat)findNearest();
  toast(accessibleOnly?'♿ מקלטים נגישים בלבד':'🛡️ כל 135 המקלטים');
}
document.getElementById('btn-acc-hdr').onclick=toggleAcc;

document.getElementById('btn-alert').onclick=function(){
  const bar=document.getElementById('alert-bar');
  const on=bar.style.display==='block';
  bar.style.display=on?'none':'block';
  if(!on){
    if(!userLat)placeUser(32.0730,34.8200);
    else findNearest();
    toast('🚨 אזעקה! מציג מקלט קרוב!');
  }
};

function setStatus(txt){document.getElementById('status-txt').textContent=txt;document.getElementById('status-card').classList.add('show');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

// Load Leaflet
window.APP_READY=true;
function loadLeaflet(){
  const s=document.createElement('script');
  s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';s.crossOrigin='';
  s.onload=()=>{if(window.APP_READY)initApp();};
  s.onerror=()=>{
    const s2=document.createElement('script');
    s2.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';s2.crossOrigin='';
    s2.onload=()=>{if(window.APP_READY)initApp();};
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}
loadLeaflet();
</script>
</body>
</html>
