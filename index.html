<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://a.tile.openstreetmap.org">
  <link rel="preconnect" href="https://b.tile.openstreetmap.org">
  <link rel="dns-prefetch" href="https://c.tile.openstreetmap.org">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a56db">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="מקלט קרוב">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>מקלט קרוב — גוש דן + תל אביב</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<style>
:root{--bg:#f5f6fa;--surface:#fff;--surface2:#f0f2f8;--border:rgba(0,0,0,0.10);--red:#e63946;--red-glow:rgba(230,57,70,0.25);--green:#2ecc71;--blue:#1a56db;--text:#1a2340;--muted:#7a8aaa;--accent:#2563eb;}
[data-theme="dark"]{--bg:#0f1117;--surface:#1a1d26;--surface2:#22263a;--border:rgba(255,255,255,0.09);--red:#ff4757;--red-glow:rgba(255,71,87,0.30);--green:#2ecc71;--blue:#4f8ef7;--text:#e8eaf6;--muted:#7a8aaa;--accent:#60a5fa;}
[data-theme="dark"] #header{background:#1a1d26;box-shadow:0 1px 8px rgba(0,0,0,0.4);}
[data-theme="dark"] #header,
[data-theme="dark"] #bottom-panel{background:var(--surface);}
[data-theme="dark"] #city-select{background:#22263a;color:var(--blue);border-color:#3a4060;}
[data-theme="dark"] .leaflet-tile{filter:brightness(0.75) invert(1) contrast(1.1) hue-rotate(200deg);}
[data-theme="dark"] .leaflet-control-attribution{background:rgba(0,0,0,0.6)!important;color:#aaa!important;}
[data-theme="dark"] #acc-toggle{background:rgba(26,29,38,0.95);}
[data-theme="dark"] #status-card{background:rgba(26,29,38,0.95);}
[data-theme="dark"] #oref-status{background:rgba(26,29,38,0.9);color:var(--muted);}
[data-theme="dark"] #report-sheet{background:var(--surface);}
[data-theme="dark"] .form-group select,
[data-theme="dark"] .form-group input,
[data-theme="dark"] .form-group textarea{background:var(--surface2);color:var(--text);border-color:var(--border);}
[data-theme="dark"] .btn-cancel{background:var(--surface2);color:var(--muted);}
[data-theme="dark"] #loading{background:var(--bg);}
[data-theme="dark"] #toast{background:#2a3350;}
[data-theme="dark"] .shelter-card{background:var(--surface2);}
[data-theme="dark"] .card-note{background:rgba(255,255,255,0.04);}
[data-theme="dark"] .card-wifi{background:rgba(79,142,247,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;transition:background 0.25s,color 0.25s;}
#app{display:flex;flex-direction:column;height:100vh;}
#alert-bar{position:fixed;top:0;left:0;right:0;z-index:3000;background:var(--red);color:#fff;text-align:center;font-size:14px;font-weight:700;padding:10px 16px;display:none;animation:pulsebar 1.4s ease-in-out infinite;}
@keyframes pulsebar{0%,100%{opacity:1}50%{opacity:0.65}}
#header{position:relative;z-index:200;padding:10px 14px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;box-shadow:0 1px 8px rgba(0,0,0,0.06);}
.logo-area{display:flex;align-items:center;gap:9px;}
.logo-icon{width:38px;height:38px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 10px var(--red-glow);flex-shrink:0;}
.logo-text h1{font-size:16px;font-weight:900;letter-spacing:-0.3px;line-height:1.1;color:var(--text);}
.logo-text p{font-size:10px;color:var(--muted);}
.btn-icon{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0;}
.btn-icon:active{transform:scale(0.91);}
.btn-icon.active{background:var(--green);border-color:var(--green);color:#fff;}
#city-select{font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;color:var(--blue);background:#eef2ff;border:1px solid #c7d2fe;border-radius:8px;padding:5px 10px;cursor:pointer;}
#map-wrap{flex:1;position:relative;overflow:hidden;min-height:0;}
#map{width:100%;height:100%;}
#btn-locate{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:500;background:var(--red);color:#fff;border:none;border-radius:50px;padding:14px 28px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px var(--red-glow),0 2px 8px rgba(0,0,0,0.15);display:flex;align-items:center;gap:9px;transition:all 0.2s;white-space:nowrap;}
#btn-locate:active{transform:translateX(-50%) scale(0.95);}
#btn-locate.loading{background:#aab0c0;pointer-events:none;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
#btn-locate.loading .spinner{display:block;}
#btn-locate.loading .btn-txt{display:none;}
#acc-toggle{position:absolute;top:12px;left:12px;z-index:500;background:rgba(255,255,255,0.95);border:1px solid var(--border);border-radius:10px;padding:7px 12px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
#acc-toggle.active{background:rgba(46,204,113,0.1);color:var(--green);border-color:var(--green);}
#status-card{position:absolute;top:12px;right:12px;z-index:500;background:rgba(255,255,255,0.95);border:1px solid var(--border);border-radius:12px;padding:8px 13px;font-size:12px;color:var(--muted);align-items:center;gap:7px;display:none;backdrop-filter:blur(10px);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
#status-card.show{display:flex;}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.5s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
#bottom-panel{position:relative;z-index:200;background:#fff;border-top:1px solid var(--border);max-height:50vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.34,1.4,0.64,1);flex-shrink:0;}
#bottom-panel.open{transform:translateY(0);}
.panel-drag{width:38px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.panel-hdr{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.panel-hdr h2{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;}
.panel-hdr span{font-size:11px;color:var(--muted);}
.shelter-list{padding:0 10px 16px;display:flex;flex-direction:column;gap:7px;}
.shelter-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 13px;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden;}
.shelter-card::after{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:var(--muted);border-radius:0 12px 12px 0;}
.shelter-card.nearest::after{background:var(--red);}
.shelter-card.is-acc::after{background:var(--green);}
.shelter-card.nearest.is-acc::after{background:linear-gradient(to bottom,var(--red) 50%,var(--green) 50%);}
.shelter-card:active{transform:scale(0.98);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;}
.card-name{font-size:14px;font-weight:800;line-height:1.3;flex:1;color:var(--text);}
.badges{display:flex;flex-direction:column;gap:3px;align-items:flex-end;}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.badge-n{background:rgba(230,57,70,0.1);color:var(--red);border:1px solid rgba(230,57,70,0.3);}
.badge-a{background:rgba(46,204,113,0.1);color:var(--green);border:1px solid rgba(46,204,113,0.3);}
.card-addr{font-size:11px;color:var(--muted);margin-bottom:4px;}
.card-nbr{font-size:10px;color:#aab0c0;margin-bottom:7px;}
.card-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.meta{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--muted);}
.meta strong{color:var(--text);font-weight:700;}
.card-note{margin-top:6px;font-size:10px;color:var(--muted);padding:4px 8px;background:rgba(0,0,0,0.03);border-radius:6px;}
.card-wifi{margin-top:5px;font-size:10px;color:var(--accent);padding:4px 8px;background:rgba(37,99,235,0.05);border-radius:6px;display:flex;align-items:center;gap:4px;}
.avail-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:4px;}
.avail-247{background:rgba(46,204,113,0.12);color:#16a34a;}
.avail-hours{background:rgba(245,158,11,0.12);color:#b45309;}
.card-actions{display:flex;gap:7px;margin-top:10px;}
.btn-nav{flex:1;padding:10px 8px;border-radius:9px;border:none;font-family:'Heebo',sans-serif;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all 0.18s;}
.btn-waze{background:#00c2c2;color:#000;}
    .btn-route{background:#4cc9f0;color:#000;}
.btn-google{background:#4285f4;color:#fff;}
.btn-nav:active{transform:scale(0.95);}
#loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.5s;}
#loading.hidden{opacity:0;pointer-events:none;}
.load-icon{width:72px;height:72px;background:var(--red);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:0 0 40px var(--red-glow);animation:loadpulse 1.4s ease-in-out infinite;}
@keyframes loadpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}.load-title{font-size:22px;font-weight:900;color:var(--text);}.load-sub{font-size:12px;color:var(--muted);}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);z-index:2000;background:#1e2f4a;border-radius:12px;padding:10px 18px;font-size:12px;font-weight:600;color:#fff;opacity:0;transition:all 0.3s;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#bottom-panel::-webkit-scrollbar{width:3px;}
#bottom-panel::-webkit-scrollbar-thumb{background:var(--border);}

/* Alert API */
#alert-bar{cursor:pointer;}
#alert-bar .alert-city{font-weight:900;font-size:16px;}
#alert-bar .alert-sub{font-size:11px;opacity:0.85;}
/* Report modal */
#report-modal{position:fixed;inset:0;z-index:4000;background:rgba(0,0,0,0.5);display:none;align-items:flex-end;justify-content:center;}
#report-modal.open{display:flex;}
#report-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 18px 30px;max-height:80vh;overflow-y:auto;}
#report-sheet h3{font-size:17px;font-weight:900;margin-bottom:4px;color:var(--text);}
#report-sheet p.sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.report-drag{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;}
.form-group select,.form-group input,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-family:'Heebo',sans-serif;font-size:14px;color:var(--text);background:#fff;outline:none;}
.form-group textarea{height:80px;resize:none;}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:var(--blue);}
.btn-submit{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:800;cursor:pointer;margin-top:4px;}
.btn-submit:active{transform:scale(0.98);}
.btn-cancel{width:100%;padding:11px;background:var(--surface2);color:var(--muted);border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
#oref-status{position:absolute;bottom:62px;left:50%;transform:translateX(-50%);z-index:499;font-size:10px;color:var(--muted);background:rgba(255,255,255,0.85);padding:3px 10px;border-radius:20px;backdrop-filter:blur(4px);white-space:nowrap;}

    /* Fallback marker */
    
    .fallback-warning{
      background:#fef3c7;
      border:1.5px solid #f59e0b;
      border-radius:6px;
      padding:6px 10px;
      margin:6px 0 4px 0;
      font-size:12px;
      color:#92400e;
      display:flex;
      align-items:flex-start;
      gap:6px;
      line-height:1.4;
    }
    .fallback-warning strong{color:#b45309;}
    .fallback-badge{display:inline-block;background:#f59e0b;color:#fff;font-size:10px;padding:1px 5px;border-radius:3px;margin-right:4px;vertical-align:middle;}
    /* RKL station */
    .rkl-badge{display:inline-block;background:#7c3aed;color:#fff;font-size:10px;padding:1px 5px;border-radius:3px;margin-right:4px;vertical-align:middle;}
    /* Timer */
    #timer-bar{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#dc2626;color:#fff;text-align:center;padding:8px;font-size:18px;font-weight:700;letter-spacing:1px;}
    #timer-bar.active{display:block;}
    .timer-btn{background:#dc2626;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;cursor:pointer;margin-top:8px;width:100%;}
    .timer-btn:hover{background:#b91c1c;}
</style>
</head>
<body>

<div id="timer-bar">
  🚨 <span id="timer-count">90</span> שניות להגיע למקלט
</div>

<div id="alert-bar">🚨 אזעקה! גש מיד למקלט הקרוב ביותר</div>
<div id="loading"><div class="load-icon">🛡️</div><div class="load-title">מקלט קרוב</div><div class="load-sub">759 מקלטים • 13 ערים</div></div>
<div id="app">
  <div id="header">
    <div class="logo-area">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text"><h1>מקלט קרוב</h1><p id="hdr-sub">759 מקלטים • 13 ערים</p></div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <select id="city-select" onchange="filterCity(this.value)">
        <option value="">כל הערים</option>
        <option value="רמת גן">רמת גן</option>
        <option value="גבעתיים">גבעתיים</option>
        <option value="פתח תקווה">פתח תקווה</option>
        <option value="בני ברק">בני ברק</option>
        <option value="אור יהודה">אור יהודה</option>
        <option value="יהוד-מונוסון">יהוד-מונוסון</option>
        <option value="קריית אונו">קריית אונו</option>
        <option value="סביון">סביון</option>
        <option value="תל אביב-יפו">תל אביב-יפו</option>
        <option value="חולון">חולון</option>
        <option value="בת ים">בת ים</option>
        <option value="גני תקווה">גני תקווה</option>
        <option value="גבעת שמואל">גבעת שמואל</option>
        
      </select>
      <button class="btn-icon" id="btn-dark" title="מצב לילה" onclick="toggleDark()">🌙</button>
      <button class="btn-icon" id="btn-report" title="דווח על מקלט" onclick="openReport()">📝</button>
      <button class="btn-icon" id="btn-alert" title="סמלץ אזעקה">🚨</button>
      <button class="btn-icon active" id="btn-acc-hdr" title="נגישות">♿</button>
    </div>
  </div>
  <div id="map-wrap">
    <div id="map"></div>
    <div id="acc-toggle" class="active" onclick="toggleAcc()"><span>♿</span><span id="acc-label">נגיש בלבד</span></div>
    <div id="status-card"><div id="status-dot"></div><span id="status-txt">ממקם...</span></div>
    <button id="btn-locate" onclick="locateMe()">
      <span class="btn-txt">📍 מצא מקלט קרוב</span>
      <div class="spinner"></div>
    </button>
  </div>
  <div id="bottom-panel">
    <div class="panel-drag"></div>
    <div class="panel-hdr"><h2 id="panel-title">מקלטים קרובים</h2><span id="panel-count"></span></div>
    <div class="shelter-list" id="shelter-list"></div>
  </div>
</div>
<div id="oref-status">🟢 מחובר לפיקוד העורף</div>

<!-- Report Modal -->
<div id="report-modal">
  <div id="report-sheet">
    <div class="report-drag"></div>
    <h3>📝 דיווח על מקלט</h3>
    <p class="sub">עזור לנו לשפר את המידע — כל דיווח עוזר לשכנים</p>
    <div class="form-group">
      <label>בחר מקלט</label>
      <select id="report-shelter-select"><option value="">-- בחר מקלט --</option></select>
    </div>
    <div class="form-group">
      <label>סוג הדיווח</label>
      <select id="report-type">
        <option value="">-- בחר סוג --</option>
        <option value="קוד כניסה">🔢 קוד כניסה</option>
        <option value="פרטי גישה">🚪 פרטי גישה (מאחורי הבית, מהצד וכו')</option>
        <option value="סגור / לא זמין">🔒 סגור / לא זמין</option>
        <option value="WiFi">📶 רשת WiFi / סיסמה</option>
        <option value="מקלט נוסף">📍 מקלט נוסף שחסר</option>
        <option value="שגיאת מיקום">📌 המיקום שגוי במפה</option>
        <option value="אחר">✏️ אחר</option>
      </select>
    </div>
    <div class="form-group">
      <label>פרטים</label>
      <textarea id="report-details" placeholder="לדוגמה: קוד כניסה 1234#, כניסה מרחוב אחד העם מאחורי הבניין..."></textarea>
    </div>
    <div class="form-group">
      <label>טלפון / מייל (אופציונלי)</label>
      <input type="text" id="report-contact" placeholder="אם תרצה שנחזור אליך">
    </div>
    <button class="btn-submit" onclick="submitReport()">📤 שלח דיווח</button>
    <button class="btn-cancel" onclick="closeReport()">ביטול</button>
  </div>
</div>

let map,userMarker,userCircle,userLat=null,userLng=null;
let accessibleOnly=true,cityFilter='';
let markers=[];

function dist(a,b,c,d){const R=6371000,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180;const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function fmt(m){return m<1000?`${Math.round(m)} מ'`:`${(m/1000).toFixed(1)} ק"מ`;}


// זיהוי מקלטים עם קואורדינטות אומדן (fallback)
// fallback = lat ו-lng מעוגלים ל-3 ספרות עשרוניות בדיוק (x.xxx0)
function isFallback(s){
  if(!s.lat||!s.lng) return false;
  const KNOWN_FALLBACKS=[
    [32.034,34.878], // גני תקווה fallback
    [32.078,34.847], // גבעת שמואל fallback
    [32.060,34.877], // גני תקווה center
  ];
  return KNOWN_FALLBACKS.some(([la,lo])=>Math.abs(s.lat-la)<0.0005&&Math.abs(s.lng-lo)<0.0005);
}

function makeIcon(emoji,color,size=32){return L.divIcon({className:'',html:`<div style="width:${size}px;height:${size}px;background:${color};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.52)}px;border:2px solid #fff;box-shadow:0 2px 10px ${color}55;">${emoji}</div>`,iconSize:[size,size],iconAnchor:[size/2,size/2],popupAnchor:[0,-size/2]});}
const ICON_RED=()=>makeIcon('🛡️','#e63946');
const ICON_GREEN=()=>makeIcon('♿','#2ecc71');
const ICON_STAR=()=>makeIcon('⭐','#e63946',42);
const ICON_YELLOW=()=>makeIcon('🛡️','#f59e0b');
const ICON_YELLOW_ACC=()=>makeIcon('♿','#f59e0b');
const ICON_RKL=()=>makeIcon('🚇','#7c3aed');
const ICON_USER=()=>L.divIcon({className:'',html:'<div style="width:18px;height:18px;background:#4cc9f0;border-radius:50%;border:3px solid #fff;box-shadow:0 0 12px rgba(76,201,240,0.7);"></div>',iconSize:[18,18],iconAnchor:[9,9]});

function initApp(){
  map=L.map('map',{center:[32.065,34.855],zoom:12,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  renderMarkers();
  document.getElementById('loading').classList.add('hidden');
}

function getPool(){
  let pool = SHELTERS.filter(s=>s.lat);
  if(cityFilter) pool=pool.filter(s=>s.city===cityFilter);
  if(accessibleOnly) pool=pool.filter(s=>s.accessible);
  return pool;
}

function renderMarkers(nearestId=null){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  getPool().forEach(s=>{
    const isFb=isFallback(s);
    const isStar=s.global_id===nearestId;
    const icon=isStar?ICON_STAR():s.type==='תחנת רכ\"ל'?ICON_RKL():isFb?(s.accessible?ICON_YELLOW_ACC():ICON_YELLOW()):(s.accessible?ICON_GREEN():ICON_RED());
    const m=L.marker([s.lat,s.lng],{icon}).addTo(map).on('click',()=>{
      scrollToCard(s.global_id);
      if(isFb) toast('⚠️ מיקום משוער — נווט לפי הכתובת');
    });
    markers.push(m);
  });
}

function locateMe(){
  const btn=document.getElementById('btn-locate');
  btn.classList.add('loading');setStatus('ממקם...');
  if(!navigator.geolocation){useDemoLoc();return;}
  navigator.geolocation.getCurrentPosition(
    p=>placeUser(p.coords.latitude,p.coords.longitude),
    ()=>{toast('משתמש במיקום ברירת מחדל');useDemoLoc();},
    {timeout:8000,maximumAge:60000}
  );
}
function useDemoLoc(){
  // Auto-detect city from filter, else use center of gush dan
  const centers={'רמת גן':[32.073,34.820],'גבעתיים':[32.072,34.809],'פתח תקווה':[32.088,34.888],'בני ברק':[32.084,34.834],'אור יהודה':[32.028,34.856],'יהוד-מונוסון':[32.033,34.887],'קריית אונו':[32.058,34.857],'סביון':[32.046,34.877],'תל אביב-יפו':[32.080,34.785],'חולון':[32.011,34.773],'בת ים':[32.022,34.749],'גני תקווה':[32.060,34.877],'גבעת שמואל':[32.078,34.848]};
  const c=cityFilter && centers[cityFilter]?centers[cityFilter]:[32.065,34.855];
  placeUser(c[0],c[1]);
}
function placeUser(lat,lng){
  userLat=lat;userLng=lng;
  if(userMarker)map.removeLayer(userMarker);
  if(userCircle)map.removeLayer(userCircle);
  userMarker=L.marker([lat,lng],{icon:ICON_USER()}).addTo(map);
  userCircle=L.circle([lat,lng],{radius:50,color:'#4cc9f0',fillColor:'#4cc9f0',fillOpacity:0.08,weight:1}).addTo(map);
  // ללא cityFilter אוטומטי — GPS תמיד מחפש מכל המקלטים לפי מרחק
  // ת"א נטענת רק אם המשתמש בחר ידנית בתפריט
  findNearest();
}

function findNearest(){
  const btn=document.getElementById('btn-locate');
  const pool=getPool();
  if(!pool.length){btn.classList.remove('loading');toast('לא נמצאו מקלטים — שנה פילטר');return;}
  const sorted=pool.map(s=>{return{...s,d:dist(userLat,userLng,s.lat,s.lng)}}).sort((a,b)=>a.d-b.d);
  const nearest=sorted[0];
  renderMarkers(nearest.global_id);
  map.flyToBounds(L.latLngBounds([[userLat,userLng],[nearest.lat,nearest.lng]]),{padding:[60,60],maxZoom:16});
  setStatus(`${fmt(nearest.d)} ממך`);
  renderPanel(sorted);
  btn.classList.remove('loading');
  setTimeout(openPanel,600);
}

function renderPanel(sorted){
  document.getElementById('panel-count').textContent=`${sorted.length} מקלטים`;
  const list=document.getElementById('shelter-list');
  list.innerHTML='';
  const top5=sorted.slice(0,5);
  top5.forEach((s,i)=>{
    const walk=Math.ceil(s.d/80);
    const card=document.createElement('div');
    card.className='shelter-card'+(i===0?' nearest':'')+(s.accessible?' is-acc':'');
    card.id=`card-${s.global_id}`;
    let extra='';
    if(s.availability==='24/7') extra='<span class="avail-badge avail-247">24/7</span>';
    else if(s.availability&&s.availability!=='') extra='<span class="avail-badge avail-hours">שעות פעילות</span>';
    const noteHtml=s.note?`<div class="card-note">💡 ${s.note}</div>`:'';
    const wifiHtml=s.wifi?`<div class="card-wifi">📶 ${s.wifi}</div>`:'';
    card.innerHTML=`
      <div class="card-top">
        <div class="card-name">${s.name}</div>
        <div class="badges">
          ${i===0?'<span class="badge badge-n">קרוב ביותר</span>':''}
          ${s.accessible?'<span class="badge badge-a">♿ נגיש</span>':''}
        </div>
      </div>
      <div class="card-addr">📍 ${s.address}</div>
      <div class="card-nbr">🏘️ ${s.city}${s.neighborhood?' · '+s.neighborhood:''}</div>
      <div class="card-meta">
        <div class="meta">🚶 <strong>${walk} דק'</strong></div>
        <div class="meta">📏 <strong>${fmt(s.d)}</strong></div>
        ${extra}
      </div>
      ${noteHtml}${wifiHtml}
      ${isFb?`<div class="fallback-warning">
        <span style="font-size:16px;flex-shrink:0;">⚠️</span>
        <span><strong>מיקום משוער בלבד</strong> — הכתובת נכונה אך המיקום במפה אינו מדויק. <strong>נווט לפי הכתובת</strong>, לא לפי הסמן.</span>
      </div>`:''}
      <div class="card-actions">
        <button class="btn-nav btn-waze" onclick="navWaze(${s.lat},${s.lng},event)">🟦 Waze</button>
        <button class="btn-nav btn-google" onclick="navGoogle(${s.lat},${s.lng},event)">🗺️ Maps</button>
        <button class="btn-nav btn-route" onclick="drawWalkingRoute(${s.lat},${s.lng});map.flyTo([${s.lat},${s.lng}],17);event.stopPropagation();">🚶 מסלול</button>
      </div>`;
    card.addEventListener('click',e=>{if(e.target.classList.contains('btn-nav'))return;map.flyTo([s.lat,s.lng],17);});
    list.appendChild(card);
  });
  if(sorted.length>5){
    const more=document.createElement('div');
    more.style.cssText='text-align:center;padding:8px;font-size:11px;color:var(--muted);';
    more.textContent=`+ ${sorted.length-5} מקלטים נוספים`;
    list.appendChild(more);
  }
}

function openPanel(){document.getElementById('bottom-panel').classList.add('open');}
function scrollToCard(id){openPanel();setTimeout(()=>{const el=document.getElementById(`card-${id}`);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},400);}

function drawWalkingRoute(toLat,toLng){
  if(!userLat) return;
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  // קו הליכה ישיר עם אנימציה
  routeLine = L.polyline(
    [[userLat,userLng],[toLat,toLng]],
    {color:'#4cc9f0',weight:4,opacity:0.85,dashArray:'10,8',lineJoin:'round'}
  ).addTo(map);
  // Fit map to show both user and shelter
  map.fitBounds([[userLat,userLng],[toLat,toLng]],{padding:[60,60]});
}
function clearRoute(){
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
}

function navWaze(lat,lng,e){e&&e.stopPropagation();window.open(`https://waze.com/ul?ll=${lat},${lng}&navigate=yes`,'_blank');}
function navGoogle(lat,lng,e){e&&e.stopPropagation();window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=walking`,'_blank');}

function filterCity(city){clearRoute();
  cityFilter=city;
  if(city === 'תל אביב-יפו') {
    ensureTAShelters().then(()=>{
      renderMarkers();
      if(userLat) findNearest();
      else map.flyTo([32.080,34.785],13);
      const count=getPool().length;
      toast(`תל אביב-יפו: ${count} מקלטים`);
    });
    return;
  }
  renderMarkers();
  if(userLat)findNearest();
  else if(city){
    const centers={'רמת גן':[32.073,34.820],'גבעתיים':[32.072,34.809],'פתח תקווה':[32.088,34.888],'בני ברק':[32.084,34.834],'אור יהודה':[32.028,34.856],'יהוד-מונוסון':[32.033,34.887],'קריית אונו':[32.058,34.857],'סביון':[32.046,34.877],'תל אביב-יפו':[32.080,34.785],'חולון':[32.011,34.773],'בת ים':[32.022,34.749],'גני תקווה':[32.060,34.877],'גבעת שמואל':[32.078,34.848]};
    if(centers[city])map.flyTo(centers[city],14);
  } else map.flyTo([32.065,34.855],12);
  const count=getPool().length;
  toast(`${city||'כל הערים'}: ${count} מקלטים`);
}

function toggleAcc(){
  accessibleOnly=!accessibleOnly;
  document.getElementById('acc-toggle').classList.toggle('active',accessibleOnly);
  document.getElementById('btn-acc-hdr').classList.toggle('active',accessibleOnly);
  document.getElementById('acc-label').textContent=accessibleOnly?'נגיש בלבד':'כל המקלטים';

document.getElementById('btn-acc-hdr').onclick=toggleAcc;

document.getElementById('btn-alert').onclick=function(){

function setStatus(txt){document.getElementById('status-txt').textContent=txt;document.getElementById('status-card').classList.add('show');}

// ═══════════════════════════════════════════
// OREF ALERT API
// ═══════════════════════════════════════════
const OREF_URL = 'https://www.oref.org.il/WarningMessages/alert/alerts.json';
const OREF_HEADERS = {
  'X-Requested-With': 'XMLHttpRequest',
  'Referer': 'https://www.oref.org.il/',
};
// Cities we cover

// ===== TEL AVIV DYNAMIC LOADER =====
const TA_API_URL = 'https://gisn.tel-aviv.gov.il/arcgis/rest/services/WM/IView2WM/MapServer/592/query?where=1%3D1&outFields=ms_miklat%2Ct_sug%2CFull_Address%2Chearot%2Copening_times%2Cmiklat_mungash%2Cshem&f=json&outSR=4326&resultRecordCount=2000';
let TA_LOADED = false;
let TA_LOADING_PROMISE = null;
function convertTAFeatures(features){let nextId=10000;return features.filter(f=>f.geometry&&f.geometry.x&&f.geometry.y).map(f=>{const a=f.attributes;const accessible=!!(a.miklat_mungash)||(a.t_sug&&a.t_sug.includes('נגיש'));const addr=(a.Full_Address||'').trim();return{global_id:nextId++,city:'תל אביב-יפו',name:addr?addr+', תל אביב-יפו':'מקלט, תל אביב-יפו',address:addr?addr+', תל אביב-יפו':'תל אביב-יפו',neighborhood:'',accessible:accessible,note:(a.hearot||'').trim(),wifi:'',type:a.t_sug||'מקלט ציבורי',availability:(a.opening_times||'פתיחה אוטומטית בשעת חירום').trim(),lat:f.geometry.y,lng:f.geometry.x};})}
async function ensureTAShelters(){if(TA_LOADED)return;if(TA_LOADING_PROMISE){await TA_LOADING_PROMISE;return;}TA_LOADING_PROMISE=(async()=>{try{toast('טוען מקלטי תל אביב...');const resp=await fetch(TA_API_URL);const data=await resp.json();const ta=convertTAFeatures(data.features||[]);ta.forEach(s=>SHELTERS.push(s));TA_LOADED=true;toast(`נטענו ${ta.length} מקלטים בתל אביב-יפו ✓`);}catch(e){console.warn('TA load failed:',e);toast('⚠️ לא ניתן לטעון נתוני תל אביב');}})();await TA_LOADING_PROMISE;}
// ===== END TEL AVIV =====
const OUR_CITIES = ['רמת גן','גבעתיים','פתח תקווה','בני ברק','אור יהודה','יהוד','מונוסון','יהוד-מונוסון','קריית אונו','סביון','קרית אונו','תל אביב','תל אביב-יפו','יפו','חולון','בת ים','בת-ים'];
let lastAlertId = null;
let orefConnected = false;

async function checkOref() {
  try {
    const r = await fetch(OREF_URL, {
      headers: OREF_HEADERS,
      cache: 'no-store'
    });
    if (!r.ok) throw new Error('no response');
    const text = await r.text();
    if (!orefConnected) {
      orefConnected = true;
      document.getElementById('oref-status').innerHTML = '🟢 מחובר לפיקוד העורף';
    }
    if (!text || text.trim() === '' || text.trim() === 'null') return; // no alert
    const data = JSON.parse(text);
    if (!data || !data.data) return;
    const alertId = data.id || JSON.stringify(data.data);
    if (alertId === lastAlertId) return; // same alert, ignore
    lastAlertId = alertId;
    // Check if alert in our cities
    const alertCities = Array.isArray(data.data) ? data.data : [data.data];
    const relevant = alertCities.filter(c => OUR_CITIES.some(oc => c.includes(oc)));
    if (relevant.length > 0) {
      triggerRealAlert(data.title || 'אזעקה', relevant);
    } else {
      // show general alert bar without auto-navigation
      showAlertBar(data.title || 'אזעקה', alertCities.slice(0,3).join(', '));
    }
  } catch(e) {
    if (orefConnected) {
      orefConnected = false;
      document.getElementById('oref-status').innerHTML = '🔴 מנותק מפיקוד העורף';
    }
  }
}

function triggerRealAlert(title, cities) {
  const bar = document.getElementById('alert-bar');
  bar.innerHTML = `<div class="alert-city">🚨 ${title} — ${cities.join(', ')}</div><div class="alert-sub">לחץ למקלט הקרוב ביותר</div>`;
  bar.style.display = 'block';
  // Vibrate if supported
  if (navigator.vibrate) navigator.vibrate([300,100,300,100,300]);
  // Auto find nearest
  if (!userLat) useDemoLoc(); else findNearest();
}

function showAlertBar(title, citiesStr) {
  const bar = document.getElementById('alert-bar');
  bar.innerHTML = `<div class="alert-city">🚨 ${title}</div><div class="alert-sub">${citiesStr}</div>`;
  bar.style.display = 'block';
}

// Poll every 2 seconds
setInterval(checkOref, 2000);
setTimeout(checkOref, 1000); // first check after 1 sec

// Click on alert bar → find nearest
document.getElementById('alert-bar').addEventListener('click', function() {
  if (!userLat) useDemoLoc(); else findNearest();
});

// REPORT FORM
// ═══════════════════════════════════════════
// ===== GOOGLE FORMS CONFIG =====
// צור טופס ב-forms.google.com עם 4 שדות, ואז מלא כאן:
// 1. העתק את Form ID מה-URL (אחרי /d/e/ ולפני /viewform)
// 2. לכל שדה: לחץ F12 → Network → שלח טופס → ראה entry.XXXXXXX
const GFORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdeO4EFfhsvhA3YoA1KtsVIiBHPlYUPrsLwsWl5g6UsxnKD4Q/formResponse';
const GFORM_FIELDS = {
  shelter: 'entry.1059811916',
  type:    'entry.6835538',
  details: 'entry.1282450382',
  contact: 'entry.2089155570',
};
// כשתהיה מוכן — שלח לי את ה-IDs ואעדכן בשורה אחת
// ===== END GOOGLE FORMS =====

function openReport() {
  // Populate shelter dropdown
  const sel = document.getElementById('report-shelter-select');
  sel.innerHTML = '<option value="">-- בחר מקלט --</option>';
  // GPS תמיד מכל המקלטים, cityFilter רק אם נבחר ידנית
  const pool = cityFilter ? SHELTERS.filter(s=>s.city===cityFilter) : SHELTERS.filter(s=>s.lat);
  pool.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.name + ' — ' + s.address;
    opt.textContent = s.name + ' (' + s.city + ')';
    sel.appendChild(opt);
  });
  // Pre-select if nearest shown
  document.getElementById('report-modal').classList.add('open');
}

function closeReport() {
  document.getElementById('report-modal').classList.remove('open');
}

async function submitReport() {
  const shelter = document.getElementById('report-shelter-select').value;
  const type = document.getElementById('report-type').value;
  const details = document.getElementById('report-details').value;
  const contact = document.getElementById('report-contact').value;

  if (!shelter) { toast('בחר מקלט קודם'); return; }
  if (!type) { toast('בחר סוג דיווח'); return; }
  if (!details.trim()) { toast('הוסף פרטים'); return; }

  // Try Google Forms (if configured)
  const isConfigured = !GFORM_URL.includes('FORM_ID_HERE');
  if (isConfigured) {
    try {
      const body = new URLSearchParams();
      body.append(GFORM_FIELDS.shelter, shelter);
      body.append(GFORM_FIELDS.type, type);
      body.append(GFORM_FIELDS.details, details);
      body.append(GFORM_FIELDS.contact, contact);
      await fetch(GFORM_URL, { method: 'POST', body, mode: 'no-cors' });
    } catch(e) {}
  }

  // Also open WhatsApp fallback with the report
  const msg = `🛡️ *דיווח מקלט קרוב*
📍 ${shelter}
📋 ${type}
💬 ${details}${contact?'\n📞 '+contact:''}`;
  const waUrl = `https://wa.me/?text=${encodeURIComponent(msg)}`;

  closeReport();
  document.getElementById('report-details').value = '';
  document.getElementById('report-contact').value = '';

  toast('✅ תודה! פותח WhatsApp לשליחה...');
  setTimeout(() => window.open(waUrl, '_blank'), 800);
}

// Close modal on backdrop click
document.getElementById('report-modal').addEventListener('click', function(e) {
  if (e.target === this) closeReport();
});

// ===== DARK MODE =====
function toggleDark() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('miklat-theme', newTheme);
  const btn = document.getElementById('btn-dark');
  btn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
  btn.title = newTheme === 'dark' ? 'מצב יום' : 'מצב לילה';
  // Update meta theme-color
  document.querySelector('meta[name="theme-color"]').content = newTheme === 'dark' ? '#0f1117' : '#1a56db';
}

// Apply saved theme on load
(function() {
  const saved = localStorage.getItem('miklat-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('meta[name="theme-color"]').content = '#0f1117';
  }
  // Set button icon after DOM ready
  window.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('btn-dark');
    if (btn) {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      btn.textContent = isDark ? '☀️' : '🌙';
      btn.title = isDark ? 'מצב יום' : 'מצב לילה';
    }
  });
})();
// ===== END DARK MODE =====


// ---- TIMER 90s ----
let timerInterval=null;
function startTimer(){
  const bar=document.getElementById('timer-bar');
  const count=document.getElementById('timer-count');
  if(timerInterval){clearInterval(timerInterval);bar.classList.remove('active');timerInterval=null;count.textContent=90;return;}
  let t=90;count.textContent=t;bar.classList.add('active');
  timerInterval=setInterval(()=>{
    t--;count.textContent=t;
    if(t<=0){clearInterval(timerInterval);timerInterval=null;bar.textContent='🛡️ הגיע הזמן להיכנס למקלט!';setTimeout(()=>{bar.classList.remove('active');bar.innerHTML='🚨 <span id="timer-count">90</span> שניות להגיע למקלט';timerInterval=null;},4000);}
  },1000);
}
